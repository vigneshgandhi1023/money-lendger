name: loan_ledger
description: A premium fintech application for small money lenders to manage customers, loans, repayments, and outstanding balances.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Material Design & UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  rxdart: ^0.27.7

  # Navigation
  go_router: ^13.1.0

  # Local Storage (Offline-first)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0

  # Charts & Reports
  fl_chart: ^0.66.2
  pdf: ^3.10.8
  printing: ^5.12.0

  # Security
  local_auth: ^2.1.8
  flutter_secure_storage: ^9.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: fonts/Outfit-Medium.ttf
          weight: 500
        - asset: fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: fonts/Outfit-Bold.ttf
          weight: 700
